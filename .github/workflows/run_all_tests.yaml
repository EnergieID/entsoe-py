name: tests

on:
  pull_request:
  push:
    branches:
      - "**"

env:
  ENTSOE_API_KEY: ${{ secrets.ENTSOE_API_KEY }}
  ENTSOE_USERNAME: ${{ secrets.ENTSOE_USERNAME }}
  ENTSOE_PWD: ${{ secrets.ENTSOE_PWD }}

jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
        test-file: ["tests/test_files.py", "tests/test_raw.py", "tests/test_pandas.py"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install uv
          python -m uv pip install -r requirements_dev.txt
      - name: Run pytest
        run: pytest ${{ matrix.test-file }}